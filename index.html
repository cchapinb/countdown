<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Countdown</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: Georgia, "Times New Roman", serif;
}

#countdown {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 1vw;
    width: 100%;
    max-width: 100%;
}

.unit {
    text-align: center;
}

.number {
    font-size: clamp(38px, 8vw, 72px);
    color: white;
    line-height: 1;
    font-weight: 400;
}

.seconds .number {
    color: white;
}

.label {
    margin-top: 10px;
    font-size: clamp(10px, 2vw, 18px);
    color: white;
    letter-spacing: 1px;
    font-weight: bold;
}

.colon {
    font-size: clamp(38px, 8vw, 72px);
    color: white;
    line-height: 1;
}


@media (max-width: 500px) {

    #countdown {
        gap: 4px;
    }

    .number,
    .colon {
        font-size: 42px;
    }

    .label {
        font-size: 10px;
    }

}

</style>
</head>

<body>

<div id="countdown">

    <div class="unit">
        <div class="number" id="days">000</div>
        <div class="label">DAYS</div>
    </div>

    <div class="colon">:</div>

    <div class="unit">
        <div class="number" id="hours">00</div>
        <div class="label">HOURS</div>
    </div>

    <div class="colon">:</div>

    <div class="unit">
        <div class="number" id="minutes">00</div>
        <div class="label">MINUTES</div>
    </div>

    <div class="colon">:</div>

    <div class="unit seconds">
        <div class="number" id="seconds">00</div>
        <div class="label">SECONDS</div>
    </div>

</div>


<script>

// May 8, 2027 at 5:00 PM Eastern Time
const targetDate = new Date("2027-05-08T17:00:00-05:00").getTime();


function updateCountdown() {

    const now = new Date().getTime();
    const distance = targetDate - now;


    if (distance <= 0) {
        document.getElementById("countdown").innerHTML =
        "<div style='color:white;font-size:40px;'>The Event Has Begun</div>";
        return;
    }


    const days = Math.floor(distance / (1000 * 60 * 60 * 24));

    const hours = Math.floor(
        (distance % (1000 * 60 * 60 * 24)) /
        (1000 * 60 * 60)
    );

    const minutes = Math.floor(
        (distance % (1000 * 60 * 60)) /
        (1000 * 60)
    );

    const seconds = Math.floor(
        (distance % (1000 * 60)) /
        1000
    );


    document.getElementById("days").textContent = days;

    document.getElementById("hours").textContent =
        String(hours).padStart(2, "0");

    document.getElementById("minutes").textContent =
        String(minutes).padStart(2, "0");

    document.getElementById("seconds").textContent =
        String(seconds).padStart(2, "0");

}


updateCountdown();

setInterval(updateCountdown, 1000);

</script>

</body>
</html>
